trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: '3.11'
  nodeVersion: '22.x'
  pipCacheDir: '$(Pipeline.Workspace)/.pip'
  pnpmStoreDir: '$(Pipeline.Workspace)/.pnpm-store'
  frontendWorkingDir: 'frontend_app'

  environmentName: $[iif(eq(variables['Build.SourceBranch'], 'refs/heads/main'), 'prod', 'dev')]
  serviceConnection: $[iif(eq(variables['Build.SourceBranch'], 'refs/heads/main'), 'Azure-Subscription-Prod', 'Azure-Subscription-Dev')]
  webAppName: $[iif(eq(variables['Build.SourceBranch'], 'refs/heads/main'), 'web-prod-sonic-uksouth', 'web-dev-sonic-uksouth')]
  functionAppName: $[iif(eq(variables['Build.SourceBranch'], 'refs/heads/main'), 'func-prod-sonic-uksouth', 'func-dev-sonic-uksouth')]
  staticWebAppToken: $[iif(eq(variables['Build.SourceBranch'], 'refs/heads/main'), variables['DEPLOYMENT_TOKEN_PROD'], variables['DEPLOYMENT_TOKEN_DEV'])]
  viteApiUrl: $[iif(eq(variables['Build.SourceBranch'], 'refs/heads/main'), variables['VITE_API_URL_PROD'], variables['VITE_API_URL_DEV'])]
  viteClientId: $(VITE_CLIENT_ID)
  viteTenantId: $(VITE_TENANT_ID)
  viteEntraApiScope: $(VITE_ENTRA_API_SCOPE)
  viteDevelopment: $[iif(eq(variables['Build.SourceBranch'], 'refs/heads/main'), 'false', 'true')]

stages:
  - stage: Build
    displayName: Build and Test
    jobs:
      - job: Backend
        displayName: Backend API
        steps:
          - checkout: self
            fetchDepth: 1

          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)

          - script: mkdir -p "$(pipCacheDir)"
            displayName: Prepare pip cache

          - task: Cache@2
            displayName: Cache pip packages
            inputs:
              key: 'pip | "$(Agent.OS)" | backend_app/requirements.txt | backend_app/requirements-test.txt'
              restoreKeys: |
                pip | "$(Agent.OS)"
              path: $(pipCacheDir)

          - script: |
              sudo apt-get update
              sudo apt-get install -y libmagic1
            displayName: Install system dependencies

          - script: |
              cd backend_app
              python -m pip install --upgrade pip
              pip install -r requirements.txt -r requirements-test.txt
              python -m pytest tests --junitxml=test-results.xml --cov=app --cov-report=xml
            displayName: Test backend
            env:
              PIP_CACHE_DIR: $(pipCacheDir)
              PYTHONPATH: $(Build.SourcesDirectory)
              JWT_SECRET_KEY: test-secret-key-for-ci
              AZURE_STORAGE_ACCOUNT_URL: https://fakeaccount.blob.core.windows.net
              AZURE_OPENAI_ENDPOINT: https://test-openai.openai.azure.com

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFiles: backend_app/test-results.xml
              testRunTitle: Backend Tests

          - task: PublishCodeCoverageResults@2
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: backend_app/coverage.xml

          - task: CopyFiles@2
            displayName: Stage backend
            inputs:
              SourceFolder: backend_app
              Contents: |
                app/**
                requirements.txt
              TargetFolder: $(Build.ArtifactStagingDirectory)/backend

          - task: ArchiveFiles@2
            displayName: Zip backend
            inputs:
              rootFolderOrFile: $(Build.ArtifactStagingDirectory)/backend
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/backend.zip
              replaceExistingArchive: true

          - publish: $(Build.ArtifactStagingDirectory)/backend.zip
            artifact: backend
            displayName: Publish backend package

      - job: Functions
        displayName: Azure Functions
        steps:
          - checkout: self
            fetchDepth: 1

          - task: CopyFiles@2
            displayName: Stage functions
            inputs:
              SourceFolder: az-func-audio
              Contents: |
                **
                !local.settings.json
                !raw_transcription_response.json
                !tests/**
                !**/__pycache__/**
                !**/*.pyc
              TargetFolder: $(Build.ArtifactStagingDirectory)/functions

          - task: ArchiveFiles@2
            displayName: Zip functions
            inputs:
              rootFolderOrFile: $(Build.ArtifactStagingDirectory)/functions
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/functions.zip
              replaceExistingArchive: true

          - publish: $(Build.ArtifactStagingDirectory)/functions.zip
            artifact: functions
            displayName: Publish functions package

      - job: Frontend
        displayName: Frontend
        steps:
          - checkout: self
            fetchDepth: 1

          - task: UseNode@1
            inputs:
              version: $(nodeVersion)

          - script: |
              npm install --global corepack@latest
              corepack enable
              corepack prepare "$(node -p 'require("./$(frontendWorkingDir)/package.json").packageManager')" --activate
              pnpm --version
            displayName: Activate repo pnpm

          - script: mkdir -p "$(pnpmStoreDir)"
            displayName: Prepare pnpm cache

          - task: Cache@2
            displayName: Cache pnpm store
            inputs:
              key: 'pnpm | "$(Agent.OS)" | $(nodeVersion) | $(frontendWorkingDir)/pnpm-lock.yaml'
              restoreKeys: |
                pnpm | "$(Agent.OS)" | $(nodeVersion)
                pnpm | "$(Agent.OS)"
              path: $(pnpmStoreDir)

          - script: |
              cd "$(frontendWorkingDir)"
              pnpm config set store-dir "$(pnpmStoreDir)"
              pnpm install --frozen-lockfile
              pnpm run type-check
              pnpm run lint
            displayName: Check frontend
            env:
              CI: true

          - script: |
              cd "$(frontendWorkingDir)"
              export VITE_API_URL="${VITE_API_URL:-/api}"
              export VITE_DEVELOPMENT="${VITE_DEVELOPMENT:-false}"
              rm -rf dist
              pnpm run build
              test -f dist/index.html
              cp staticwebapp.config.json dist/
            displayName: Build frontend
            env:
              CI: true
              VITE_API_URL: $(viteApiUrl)
              VITE_CLIENT_ID: $(viteClientId)
              VITE_TENANT_ID: $(viteTenantId)
              VITE_ENTRA_API_SCOPE: $(viteEntraApiScope)
              VITE_DEVELOPMENT: $(viteDevelopment)

          - publish: $(frontendWorkingDir)/dist
            artifact: frontend
            displayName: Publish frontend package

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    condition: and(succeeded(), in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop'))
    jobs:
      - deployment: Backend
        displayName: Backend API
        environment: $(environmentName)
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: backend

                - task: AzureWebApp@1
                  displayName: Deploy backend
                  inputs:
                    azureSubscription: $(serviceConnection)
                    appType: webAppLinux
                    appName: $(webAppName)
                    package: $(Pipeline.Workspace)/backend/backend.zip
                    runtimeStack: PYTHON|3.11
                    deploymentMethod: zipDeploy
                    appSettings: >-
                      -SCM_DO_BUILD_DURING_DEPLOYMENT true
                      -ENABLE_ORYX_BUILD true
                      -WEBSITE_RUN_FROM_PACKAGE 1
                      -VITE_CLIENT_ID $(viteClientId)
                      -VITE_TENANT_ID $(viteTenantId)
                      -VITE_ENTRA_API_SCOPE $(viteEntraApiScope)
                      -PASSWORD_LOGIN_ENABLED false
                      -ADMIN_PASSWORD_LOGIN_ENABLED false

      - deployment: Functions
        displayName: Azure Functions
        environment: $(environmentName)
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: functions

                - task: AzureFunctionApp@2
                  displayName: Deploy functions
                  inputs:
                    azureSubscription: $(serviceConnection)
                    appType: functionAppLinux
                    appName: $(functionAppName)
                    package: $(Pipeline.Workspace)/functions/functions.zip
                    runtimeStack: PYTHON|3.11
                    deploymentMethod: zipDeploy
                    appSettings: >-
                      -SCM_DO_BUILD_DURING_DEPLOYMENT true
                      -ENABLE_ORYX_BUILD true

      - deployment: Frontend
        displayName: Frontend
        environment: $(environmentName)
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: frontend

                - task: AzureStaticWebApp@0
                  displayName: Deploy frontend
                  inputs:
                    workingDirectory: $(Pipeline.Workspace)
                    app_location: frontend
                    config_file_location: frontend
                    skip_app_build: true
                    skip_api_build: true
                    azure_static_web_apps_api_token: $(staticWebAppToken)
                  condition: and(succeeded(), ne(variables['staticWebAppToken'], ''))
